version: "3.9"

# ── DataForge AI — Full Stack ─────────────────────────────────────────────────
#
#  Service     Port    Description
#  ─────────── ──────  ──────────────────────────────────────────────────────
#  frontend    3000    React SPA (nginx, proxies /api → api:8000)
#  api         8000    FastAPI backend
#  mlflow      5000    MLflow experiment tracking UI
#  ollama      11434   Local LLM (tinyllama, nomic-embed-text)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── React Frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dataforge-frontend
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dataforge-api
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./data:/app/data
      - ./mlruns:/app/mlruns
    depends_on:
      ollama:
        condition: service_started
      mlflow:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  # ── MLflow Tracking ─────────────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    container_name: dataforge-mlflow
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri /mlruns
        --default-artifact-root /mlruns
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    restart: unless-stopped

  # ── Ollama (Local LLM) ──────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: dataforge-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped

# ── Named volumes ───────────────────────────────────────────────────────────
volumes:
  ollama_models:

